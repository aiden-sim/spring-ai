spring:
  application:
    name: mcp-client
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
    mcp:
      client:
        toolcallback:
          enabled: true
        sse:
          connections:
            mcp-server:
              url: http://localhost:8081
              sse-endpoint: /mcp/sse

server:
  port: 8080
